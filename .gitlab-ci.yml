publish:
  stage: publish
  tags:
    - dotnet
    - ubuntu
    - deploy
  script:
    - dotnet publish "$API_PROJECT" --configuration Release --output "$PUBLISH_DIR" --source "$NUGET_SOURCE_RUNFLARE" --source "$NUGET_SOURCE_LIARA"
  artifacts:
    paths:
      - "$PUBLISH_DIR"
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success

deploy:
  stage: deploy
  tags:
    - dotnet
    - ubuntu
    - deploy
  script:
#    chmod +x "$MIGRATIONS_BUNDLE"
#    - "$MIGRATIONS_BUNDLE" --connection "${DB_CONNECTION_STRING}" --verbose
    - sudo /usr/local/bin/deploy-ngerp.sh "$PUBLISH_DIR"
    - echo "Deployment done."
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
