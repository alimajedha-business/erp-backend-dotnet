# .gitlab-ci.yml
workflow:
  rules:
    - if: '$CI_DISABLED == "true"'
      when: never
    - when: always

stages:
  - build
  - publish
 # - migrations
  - deploy

variables:
  SOLUTION_FILE: "NGErp.sln"
  API_PROJECT:   "Src/API/API/NGErp.API.csproj"
  MIGRATIONS_PROJECT: "Src/BaseModule/Base.Infrastructure/NGErp.Base.Infrastructure.csproj"
  PUBLISH_DIR:   "${CI_PROJECT_DIR}/publish"
  MIGRATIONS_BUNDLE: "${CI_PROJECT_DIR}/efbundle"
  DEPLOY_TARGET: "/home/emaco/www/dev-ngerp/backend-dotnet/"
  SERVICE_NAME:  "ngerp-dotnet.service"
  NUGET_SOURCE_RUNFLARE: "https://mirror-nuget.runflare.com/"
  NUGET_SOURCE_LIARA: "https://package-mirror.liara.ir/repository/nuget/index.json"

cache:
  key: "dotnet-${CI_COMMIT_REF_SLUG}"
  paths:
    - ~/.nuget/packages    

build:
  stage: build
  tags:
    - dotnet
    - ubuntu
    - deploy
  script:
    - dotnet restore "$SOLUTION_FILE" --source "$NUGET_SOURCE_RUNFLARE" --source "$NUGET_SOURCE_LIARA"
    - dotnet build   "$SOLUTION_FILE" --configuration Release --no-restore
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success

