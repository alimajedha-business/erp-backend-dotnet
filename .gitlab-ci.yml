# .gitlab-ci.yml
# Root of repo → next to NGErp.sln

stages:
  - build
  - publish
  - deploy

variables:
  SOLUTION_FILE: "NGErp.sln"
  API_PROJECT:   "Src/API/API/NGErp.API.csproj"
  PUBLISH_DIR:   "${CI_PROJECT_DIR}/publish"
  DEPLOY_TARGET: "/home/emaco/www/dev-ngerp/backend-dotnet/"
  SERVICE_NAME:  "ngerp-dotnet.service"

cache:
  key: "dotnet-${CI_COMMIT_REF_SLUG}"
  paths:
    - ~/.nuget/packages

build:
  stage: build
  tags:
    - dotnet
    - ubuntu
    - deploy
  script:
    - dotnet restore "$SOLUTION_FILE"
    - dotnet build   "$SOLUTION_FILE" --configuration Release --no-restore
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success     # Validate on MRs
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success

publish:
  stage: publish
  tags:
    - dotnet
    - ubuntu
    - deploy
  script:
    - dotnet publish "$API_PROJECT" --configuration Release --no-build --no-restore --output "$PUBLISH_DIR"
  artifacts:
    paths:
      - "$PUBLISH_DIR"
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success

deploy:
  stage: deploy
  tags:
    - dotnet
    - ubuntu
    - deploy
  script:
    - sudo systemctl stop  "$SERVICE_NAME" || true
    - sudo rm -rf          "$DEPLOY_TARGET"/*               # Clean old files safely
    - sudo cp -r           "$PUBLISH_DIR"/* "$DEPLOY_TARGET"/
    - sudo chown -R emaco:emaco "$DEPLOY_TARGET"
    - sudo systemctl start "$SERVICE_NAME"
    - echo "Deployment done. Service logs/status:"
    - sudo systemctl status "$SERVICE_NAME" --no-pager --lines=20
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success